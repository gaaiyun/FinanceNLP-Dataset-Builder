name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # tests/ 只用标准库 + pytest（网络/LLM 全部 mock），走轻量路径：
          # 不安装 requirements.txt 里的 torch/transformers/spacy 等重模型依赖。
          python -m pip install pytest

      - name: Run tests
        run: |
          python -m pytest tests/ -o addopts="" -v
